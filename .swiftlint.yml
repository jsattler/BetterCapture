included:
  - BetterCapture
  - BetterCaptureTests

excluded:
  - BetterCapture.xcodeproj

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - empty_collection_literal
  - empty_string
  - explicit_init
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - let_var_whitespace
  - lower_acl_than_parent
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - weak_delegate
  - yoda_condition

disabled_rules:
  - todo

analyzer_rules:
  - unused_import
  - unused_declaration

line_length:
  warning: 180
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
